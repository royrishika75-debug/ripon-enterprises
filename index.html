<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ripon Enterprises</title>

<style>
body { font-family: Arial; margin:0; background:#f4f4f4; }
.container { padding:20px; }
.card { background:white; padding:15px; margin:10px 0; border-radius:10px; box-shadow:0 2px 5px rgba(0,0,0,0.1);} 
button { padding:8px 12px; margin:5px; border:none; border-radius:5px; background:#007bff; color:white; cursor:pointer; }
button.delete { background:#dc3545; }
input { padding:10px; margin:5px 0; width:100%; }
.hidden { display:none; }
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="container">
<h2>Welcome to Ripon Enterprises</h2>
<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<p id="loginError" style="color:red;"></p>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="container hidden">
<h2>Dashboard</h2>
<button onclick="showPage('stock')">Stock</button>
<button onclick="showPage('purchase')">Customer Purchase</button>
<button onclick="showPage('sales')">Sales</button>
<button onclick="logout()">Logout</button>
</div>

<!-- STOCK -->
<div id="stock" class="container hidden">
<h2>Stock</h2>
<input id="itemName" placeholder="Item Name">
<input id="itemQty" type="number" placeholder="Quantity">
<button onclick="addStock()">Add</button>
<div id="stockList"></div>
<button onclick="back()">Back</button>
</div>

<!-- PURCHASE -->
<div id="purchase" class="container hidden">
<h2>Customer Purchase</h2>
<input id="pItem" placeholder="Item Name">
<input id="pQty" type="number" placeholder="Quantity">
<input id="pPrice" type="number" placeholder="Selling Price">
<input id="pCost" type="number" placeholder="Cost Price">
<button onclick="addPurchase()">Add Purchase</button>
<div id="purchaseList"></div>
<button onclick="back()">Back</button>
</div>

<!-- SALES -->
<div id="sales" class="container hidden">
<h2>Sales</h2>
<p id="totalSales"></p>
<p id="totalProfit"></p>
<button onclick="back()">Back</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* 🔥 PASTE YOUR FIREBASE CONFIG HERE (IMPORTANT) */
const firebaseConfig = {
    apiKey: "AIzaSyD7MgOj8eoOo8IEDh_r-fVRAKJ5NUTBDjw",
    authDomain: "ripon-enterprises.firebaseapp.com",
    projectId: "ripon-enterprises",
    storageBucket: "ripon-enterprises.firebasestorage.app",
    messagingSenderId: "887615053168",
    appId: "1:887615053168:web:af632d54804735b84cc3b5",
    measurementId: "G-07KSEEMFNP"
  };

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* LOGIN */
window.login = function() {
  const u = document.getElementById('username').value;
  const p = document.getElementById('password').value;

  if(u === 'admin' && p === '1234') {
    document.getElementById('login').classList.add('hidden');
    document.getElementById('dashboard').classList.remove('hidden');
  } else {
    document.getElementById('loginError').innerText = 'Invalid login';
  }
}

window.logout = function() {
  location.reload();
}

window.showPage = function(page) {
  document.querySelectorAll('.container').forEach(c => c.classList.add('hidden'));
  document.getElementById(page).classList.remove('hidden');

  if(page === 'stock') loadStock();
  if(page === 'purchase') loadPurchases();
  if(page === 'sales') loadSales();
}

window.back = function() {
  showPage('dashboard');
}

/* STOCK */
window.addStock = async function() {
  const name = document.getElementById('itemName').value;
  const qty = parseInt(document.getElementById('itemQty').value);

  if(!name || isNaN(qty)) return;

  await addDoc(collection(db, "stock"), { name, qty });
  loadStock();
}

async function loadStock() {
  const querySnapshot = await getDocs(collection(db, "stock"));
  let html = '';

  querySnapshot.forEach(docSnap => {
    const data = docSnap.data();
    html += `
    <div class='card'>
      ${data.name}: ${data.qty}
      <button class='delete' onclick="deleteStock('${docSnap.id}')">Delete</button>
    </div>`;
  });

  document.getElementById('stockList').innerHTML = html;
}

window.deleteStock = async function(id) {
  await deleteDoc(doc(db, "stock", id));
  loadStock();
}

/* PURCHASE */
window.addPurchase = async function() {
  const item = document.getElementById('pItem').value;
  const qty = parseInt(document.getElementById('pQty').value);
  const price = parseFloat(document.getElementById('pPrice').value);
  const cost = parseFloat(document.getElementById('pCost').value);

  if(!item || isNaN(qty) || isNaN(price) || isNaN(cost)) return;

  await addDoc(collection(db, "purchases"), { item, qty, price, cost });
  loadPurchases();
}

async function loadPurchases() {
  const querySnapshot = await getDocs(collection(db, "purchases"));
  let html = '';

  querySnapshot.forEach(docSnap => {
    const p = docSnap.data();
    html += `
    <div class='card'>
      ${p.item} - ${p.qty} pcs - ₹${p.price}
      <button class='delete' onclick="deletePurchase('${docSnap.id}')">Delete</button>
    </div>`;
  });

  document.getElementById('purchaseList').innerHTML = html;
}

window.deletePurchase = async function(id) {
  await deleteDoc(doc(db, "purchases", id));
  loadPurchases();
}

/* SALES */
async function loadSales() {
  const querySnapshot = await getDocs(collection(db, "purchases"));
  let totalSales = 0;
  let totalProfit = 0;

  querySnapshot.forEach(doc => {
    const p = doc.data();
    totalSales += p.price * p.qty;
    totalProfit += (p.price - p.cost) * p.qty;
  });

  document.getElementById('totalSales').innerText = "Total Sales: ₹" + totalSales;
  document.getElementById('totalProfit').innerText = "Total Profit: ₹" + totalProfit;
}
</script>

</body>
</html>
